<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raku Playground</title>
<link rel="stylesheet" href="style.css?v=dev-moar">
<!-- Cache-busting build id; stamped with the commit SHA at deploy time. Set
     before the module loads so raku-runtime.js can read it. -->
<script>window.__BUILD__ = "dev-moar";</script>
<script type="module" src="playground.js?v=dev-moar"></script>
</head>
<body>
<div id="load-bar" hidden><i></i></div>
<header>
    <h1>🦋 Raku Playground</h1>
    <div class="controls">
        <select id="saga" title="Choose a saga"></select>
        <select id="level" title="Choose a level"></select>
        <span id="status" class="status loading">Loading Raku runtime (~77 MB), this takes a while…</span>
        <select id="speed" title="Playback speed">
            <option value="800">🐢 Slow</option>
            <option value="400" selected>▶ Normal</option>
            <option value="80">⏩ Fastest</option>
        </select>
        <button id="run" disabled title="Ctrl/Cmd-Enter">Loading…</button>
        <button id="stop" hidden title="Stop the running program">⏹ Stop</button>
        <button id="step" disabled title="Step through your code one command at a time">Step</button>
        <button id="clear">Clear output</button>
        <select id="runtime" title="Raku runtime (reloads the page)">
            <option value="perl6">Rakudo (perl6.js)</option>
            <option value="rakupp">rakupp (WASM)</option>
            <option value="moar">Rakudo (WASM MoarVM)</option>
        </select>
        <select id="theme" title="Editor color theme"></select>
        <button id="help" title="Take the tour" aria-label="Take the tour">?</button>
    </div>
</header>
<main>
    <div id="left">
        <aside id="instructions">
            <h2 id="lvl-name"></h2>
            <p id="lvl-goal"></p>
            <details id="lvl-more">
                <summary>Steps &amp; explanation</summary>
                <ol id="lvl-steps"></ol>
                <div id="lvl-explain"></div>
                <button id="hint-btn" hidden>Hint</button>
                <p id="lvl-hint" hidden></p>
            </details>
        </aside>
        <div id="editor"></div>
    </div>
    <div id="right">
        <div id="world" hidden></div>
        <div id="building" hidden></div>
        <div id="arena" hidden></div>
        <div id="preview"></div>
        <div id="dom-banner" class="dom-banner" hidden></div>
        <pre id="output" aria-live="polite"></pre>
    </div>
</main>
</body>
</html>
